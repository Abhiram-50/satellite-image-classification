<!DOCTYPE html>
<html>

<head>

<title>Satellite Land Cover Classification</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

    <h1 class="title">
        🛰️ Satellite Land Cover Classification
    </h1>

    <p class="subtitle">
        Deep Learning Based Remote Sensing Analysis
    </p>

    <div class="upload-card">

        <form method="POST"
              enctype="multipart/form-data">

            <input
                type="file"
                name="image"
                class="form-control mb-3"
                required>

            <button
                class="btn btn-primary w-100">

                Analyze Image

            </button>

        </form>

    </div>

    {% if prediction %}

    <div class="result-card">

        <h2>Prediction Result</h2>

        <img
        src="{{ url_for('static',
        filename='uploads/' + filename) }}">

        <br><br>

        <div class="prediction">

            {{ prediction }}

        </div>

        <div class="confidence">

            Confidence: {{ confidence }}%

        </div>

    </div>

    {% endif %}

    <div class="stats-card">

        <h3>Project Information</h3>

        <p>Algorithm: CNN</p>

        <p>Classes: 7</p>

        <p>Image Size: 128 x 128</p>

        <p>Domain: Satellite Image Classification</p>

    </div>

</div>

</body>
</html>
